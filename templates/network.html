{% extends "base.html" %}

{% block title %}CDR Network Graph | CDR Intelligence Portal{% endblock %}

{% block head_extra %}
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
#network {
  width:100%;
  height:95vh;
  border:1px solid #ccc;
}
body { margin:0; padding:0; background: #04100a; color: #fff; }
</style>
{% endblock %}

{% block content %}
<h2 style="color:#c9a84c;font-family:monospace;padding:10px 20px;">CDR Relationship Graph</h2>
<div id="network"></div>

<script>
fetch("/network-data")
.then(response => response.json())
.then(data => {
  const nodes = new vis.DataSet(data.nodes);
  const edges = new vis.DataSet(data.edges);
  const container = document.getElementById("network");
  const network = new vis.Network(container, { nodes, edges }, {
    physics: { enabled: true },
    nodes: { scaling: { min: 10, max: 50 } },
    edges: { scaling: { min: 1, max: 10 } }
  });
});
</script>
{% endblock %}
