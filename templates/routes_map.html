<!DOCTYPE html>
<html>
<head>
    <title>Most Frequent Route Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Share Tech Mono', monospace; }
        #map { width: 100%; height: 100vh; }
        .info-box {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 14px 20px;
            border-radius: 6px;
            border-left: 4px solid #c9a84c;
            max-width: 350px;
            font-size: 13px;
            line-height: 1.7;
        }
        .info-box h3 { color: #c9a84c; margin-bottom: 4px; }
        .info-box .freq { color: #ffaa00; font-weight: bold; }
        .legend {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
        .legend-line { width: 30px; height: 4px; background: #ff4444; display: inline-block; }
        .legend-circle { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #fff; }
        .legend-circle.origin { background: rgba(68, 170, 255, 0.3); }
        .legend-circle.dest { background: rgba(255, 68, 68, 0.3); }

        /* ── RESPONSIVE FIXES ──────────────────────────────────────── */
        @media (max-width: 768px) {
            .info-box { max-width: 220px; font-size: 11px; padding: 10px 14px; }
            .legend { padding: 8px 10px; font-size: 10px; bottom: 20px; right: 20px; }
        }

        @media (max-width: 480px) {
            .info-box { max-width: 160px; font-size: 10px; padding: 8px 10px; top: 6px; left: 6px; }
            .info-box h3 { font-size: 11px; }
            .legend { padding: 6px 8px; font-size: 9px; bottom: 10px; right: 10px; }
            .legend-item { font-size: 9px; gap: 4px; }
            .legend-line { width: 20px; height: 3px; }
            .legend-circle { width: 12px; height: 12px; }
        }
    </style>
</head>
<body>

<div class="info-box" id="infoBox">
    <h3>🚀 Most Frequent Route</h3>
    <p id="routeDetails">Loading...</p>
</div>

<div id="map"></div>

<div class="legend">
    <div class="legend-item"><span class="legend-line"></span> Route direction</div>
    <div class="legend-item"><span class="legend-circle origin"></span> Origin (with 300m radius)</div>
    <div class="legend-item"><span class="legend-circle dest"></span> Destination (with 300m radius)</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { preferCanvas: true }).setView([24.8607, 67.0011], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    fetch('/routes-data')
    .then(res => res.json())
    .then(routes => {
        const infoEl = document.getElementById('routeDetails');
        if (!routes || routes.length === 0) {
            infoEl.innerHTML = '⚠️ No frequent routes found. Make sure the CDR has tower coordinates.';
            return;
        }

        const route = routes[0];
        const freq = route.frequency;

        infoEl.innerHTML = `
            <b>${route.from}</b> → <b>${route.to}</b><br>
            Frequency: <span class="freq">${freq}</span> times
        `;

        const latlngs = [
            [route.from_lat, route.from_lon],
            [route.to_lat, route.to_lon]
        ];

        const polyline = L.polyline(latlngs, {
            color: '#ff4444',
            weight: 6,
            opacity: 0.8,
            smoothFactor: 1,
        }).addTo(map);

        polyline.bindPopup(`
            <b>${route.from}</b> → <b>${route.to}</b><br>
            Frequency: <b>${freq}</b> times
        `);

        L.circle([route.from_lat, route.from_lon], {
            radius: 300,
            color: '#44aaff',
            weight: 2,
            fillColor: '#44aaff',
            fillOpacity: 0.15,
            dashArray: null
        }).addTo(map).bindPopup('Origin: ' + route.from);

        L.circle([route.to_lat, route.to_lon], {
            radius: 300,
            color: '#ff4444',
            weight: 2,
            fillColor: '#ff4444',
            fillOpacity: 0.15,
            dashArray: null
        }).addTo(map).bindPopup('Destination: ' + route.to);

        L.circleMarker([route.from_lat, route.from_lon], {
            radius: 8,
            color: '#fff',
            weight: 2,
            fillColor: '#44aaff',
            fillOpacity: 0.9
        }).addTo(map).bindPopup('Origin: ' + route.from);

        L.circleMarker([route.to_lat, route.to_lon], {
            radius: 8,
            color: '#fff',
            weight: 2,
            fillColor: '#ff4444',
            fillOpacity: 0.9
        }).addTo(map).bindPopup('Destination: ' + route.to);

        map.fitBounds(polyline.getBounds(), { padding: [80, 80] });
    })
    .catch(err => {
        console.error('Error loading route:', err);
        document.getElementById('routeDetails').innerHTML = '❌ Error loading route data.';
    });
</script>
</body>
</html>
