<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}CDR Intelligence Portal{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
    {% block head_extra %}{% endblock %}
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body>
    <!-- ── LANGUAGE SWITCHER (EN / UR / SD) ─────────────────────────────────── -->
    <style>
      .lang-switcher-wrapper{position:fixed;bottom:18px;right:18px;z-index:99999;background:rgba(4,16,10,.92);backdrop-filter:blur(12px);padding:6px 14px;border-radius:6px;border:1px solid #1e4030;display:flex;align-items:center;gap:8px;box-shadow:0 4px 18px rgba(0,0,0,.35)}
      .lang-switcher-wrapper .lang-icon{color:#c9a84c;font-size:.9rem;font-family:'Share Tech Mono',monospace}
      .goog-te-banner-frame{display:none !important}
      .goog-te-menu-frame{z-index:999999 !important}
      .goog-te-gadget{font-family:'Share Tech Mono',monospace !important;font-size:.85rem !important;color:#6a9a78 !important}
      .lang-switcher-wrapper .goog-te-gadget{display:inline-block !important}
      .goog-te-gadget .goog-te-combo{background:#0d2218 !important;color:#e8f0eb !important;border:1px solid #1e4030 !important;padding:6px 12px !important;border-radius:4px !important;font-family:'Share Tech Mono',monospace !important;font-size:.85rem !important;cursor:pointer !important;outline:none !important}
      .goog-te-gadget .goog-te-combo:focus{border-color:#c9a84c !important}
      .goog-logo-link{display:none !important}
      .goog-te-gadget span{display:none !important}
      body{top:0 !important;position:relative}
      @media (max-width:640px){.lang-switcher-wrapper{bottom:10px;right:10px;padding:4px 10px}.lang-switcher-wrapper .lang-icon{font-size:.7rem}.goog-te-gadget .goog-te-combo{font-size:.7rem !important;padding:4px 8px !important}}
    </style>
    <div class="lang-switcher-wrapper">
      <span class="lang-icon">🌐</span>
      <div id="google_translate_element"></div>
    </div>
    <script type="text/javascript">
    function googleTranslateElementInit() {
    new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,ur,sd', // Only show English, Urdu, Sindhi
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
    }, 'google_translate_element');
    }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
            var banner = document.querySelector('.goog-te-banner-frame');
            if (banner) banner.style.display = 'none';
            document.body.style.top = '0px';
            document.body.style.position = 'relative';
        });
        observer.observe(document.body, { childList: true, subtree: true });
    });
    </script>
    {% block content %}{% endblock %}

  <!-- ── Auto-logout after 5 minutes of inactivity ── -->
  <script>
  (function() {
    var IDLE_MS = 5 * 60 * 1000; // 5 minutes
    var timer;
    var WARNING_MS = 60 * 1000;  // warn 1 minute before

    function logout() {
      // Delete the access_token cookie by expiring it
      document.cookie = "access_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC; SameSite=Lax";
      window.location.href = "/auth/login?reason=idle";
    }

    function showWarning() {
      if (document.getElementById('_idle_warn')) return;
      var w = document.createElement('div');
      w.id = '_idle_warn';
      w.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);' +
        'background:#1a1200;border:1px solid #c9a84c;color:#c9a84c;padding:12px 24px;' +
        'font-family:monospace;font-size:13px;z-index:99999;border-radius:6px;' +
        'box-shadow:0 4px 20px rgba(0,0,0,0.6);';
      w.innerHTML = '⚠ Session expiring in 1 minute due to inactivity. ' +
        '<a href="#" onclick="(function(){resetTimer();document.getElementById('_idle_warn').remove();})()" ' +
        'style="color:#e8c96a;text-decoration:underline;">Stay logged in</a>';
      document.body.appendChild(w);
    }

    var logoutTimer;
    function resetTimer() {
      clearTimeout(timer);
      clearTimeout(logoutTimer);
      var el = document.getElementById('_idle_warn');
      if (el) el.remove();
      // Warn at IDLE_MS - WARNING_MS, logout at IDLE_MS
      timer = setTimeout(showWarning, IDLE_MS - WARNING_MS);
      logoutTimer = setTimeout(logout, IDLE_MS);
    }

    // Reset on any user activity
    ['mousemove','keydown','mousedown','touchstart','scroll','click'].forEach(function(evt) {
      document.addEventListener(evt, resetTimer, { passive: true });
    });

    resetTimer(); // start the timer
  })();
  </script>
</body>
