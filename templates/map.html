<!DOCTYPE html>
<html>

<head>
    <title>CDR Movement Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- LEAFLET -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .info-box {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
            max-width: 300px;
        }
        
        .no-data-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 30px 40px;
            border-radius: 8px;
            font-family: monospace;
            text-align: center;
            border: 1px solid #c9a84c;
            display: none;
        }
        .no-data-overlay h2 {
            color: #c9a84c;
            margin-bottom: 10px;
        }
        .no-data-overlay p {
            color: #aaa;
            font-size: 14px;
        }

        /* ── RESPONSIVE FIXES ──────────────────────────────────────── */
        @media (max-width: 768px) {
            .info-box { max-width: 200px; font-size: 11px; padding: 8px 12px; }
            .info-box h3 { font-size: 13px; }
            .no-data-overlay { padding: 20px; max-width: 90%; }
            .no-data-overlay h2 { font-size: 1.2rem; }
            .no-data-overlay p { font-size: 12px; }
        }

        @media (max-width: 480px) {
            .info-box { max-width: 160px; font-size: 10px; padding: 6px 10px; }
            .info-box h3 { font-size: 11px; }
            .info-box p { font-size: 9px; }
            .no-data-overlay { padding: 16px; }
            .no-data-overlay h2 { font-size: 1rem; }
            .no-data-overlay p { font-size: 11px; }
        }
    </style>
</head>

<body>
    <!-- ── LANGUAGE SWITCHER (EN / UR / SD) ─────────────────────────────────── -->
    <style>
        .lang-switcher-wrapper{position:fixed;bottom:18px;right:18px;z-index:99999;background:rgba(4,16,10,.92);backdrop-filter:blur(12px);padding:6px 14px;border-radius:6px;border:1px solid #1e4030;display:flex;align-items:center;gap:8px;box-shadow:0 4px 18px rgba(0,0,0,.35)}
        .lang-switcher-wrapper .lang-icon{color:#c9a84c;font-size:.9rem;font-family:'Share Tech Mono',monospace}
        .goog-te-banner-frame{display:none !important}
        .goog-te-menu-frame{z-index:999999 !important}
        .goog-te-gadget{font-family:'Share Tech Mono',monospace !important;font-size:.85rem !important;color:#6a9a78 !important}
        .lang-switcher-wrapper .goog-te-gadget{display:inline-block !important}
        .goog-te-gadget .goog-te-combo{background:#0d2218 !important;color:#e8f0eb !important;border:1px solid #1e4030 !important;padding:6px 12px !important;border-radius:4px !important;font-family:'Share Tech Mono',monospace !important;font-size:.85rem !important;cursor:pointer !important;outline:none !important}
        .goog-te-gadget .goog-te-combo:focus{border-color:#c9a84c !important}
        .goog-logo-link{display:none !important}
        .goog-te-gadget span{display:none !important}
        body{top:0 !important;position:relative}
        @media (max-width:640px){.lang-switcher-wrapper{bottom:10px;right:10px;padding:4px 10px}.lang-switcher-wrapper .lang-icon{font-size:.7rem}.goog-te-gadget .goog-te-combo{font-size:.7rem !important;padding:4px 8px !important}}
    </style>
    <div class="lang-switcher-wrapper">
      <span class="lang-icon">🌐</span>
      <div id="google_translate_element"></div>
    </div>
    <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,ur,sd',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
            var banner = document.querySelector('.goog-te-banner-frame');
            if (banner) banner.style.display = 'none';
            document.body.style.top = '0px';
            document.body.style.position = 'relative';
        });
        observer.observe(document.body, { childList: true, subtree: true });
    });
    </script>

    <div class="info-box">
        <h3>CDR Investigation Map</h3>
        <p>Tower movement visualization</p>
    </div>

    <div class="no-data-overlay" id="noDataOverlay">
        <h2>📍 No Location Data</h2>
        <p>The uploaded CDR does not contain tower coordinates.</p>
        <p style="font-size:12px;color:#888;margin-top:12px;">Try a CDR that includes <code>latitude</code>/<code>longitude</code> columns.</p>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map', { preferCanvas: true }).setView([24.8607, 67.0011], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        fetch('/map-data')
        .then(response => response.json())
        .then(data => {
            console.log("MAP DATA:", data);
            console.log("TOTAL POINTS:", data.length);

            if (!data || data.length === 0) {
                document.getElementById('noDataOverlay').style.display = 'block';
                return;
            }

            let movementPoints = [];

            data.forEach((point, index) => {
                const lat = parseFloat(point.latitude);
                const lng = parseFloat(point.longitude);

                if (isNaN(lat) || isNaN(lng)) return;

                movementPoints.push([lat, lng]);

                const pinPoint = L.circleMarker([lat, lng], {
                    radius: 6,
                    fillColor: '#ff3333',
                    color: '#ffffff',
                    weight: 1.5,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                pinPoint.bindPopup(`
                    <b>Tower:</b> ${point.tower || 'N/A'}<br>
                    <b>Sector:</b> ${point.sector || 'N/A'}<br>
                    <b>Time:</b> ${point.time || 'N/A'}
                `);

                L.circle([lat, lng], {
                    radius: 800,
                    color: '#30a5ff',
                    weight: 1,
                    fillColor: '#30a5ff',
                    fillOpacity: 0.03
                }).addTo(map);
            });

            if (movementPoints.length > 0) {
                const polyline = L.polyline(movementPoints, {
                    color: '#0055ff',
                    weight: 3,
                    smoothFactor: 1.5,
                    opacity: 0.7
                }).addTo(map);
                map.fitBounds(polyline.getBounds());
            } else {
                document.getElementById('noDataOverlay').style.display = 'block';
            }
        })
        .catch(error => {
            console.error('Map Data Error:', error);
            document.getElementById('noDataOverlay').style.display = 'block';
        });
    </script>
</body>
</html>
