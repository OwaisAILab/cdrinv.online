<!DOCTYPE html>
<html>

<head>

    <title>CDR Movement Map</title>

    <meta charset="utf-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <!-- LEAFLET -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body {

            margin: 0;
            padding: 0;

            font-family: Arial;
        }

        #map {

            width: 100%;
            height: 100vh;
        }

        .info-box {

            position: absolute;

            top: 10px;
            left: 10px;

            z-index: 1000;

            background: white;

            padding: 10px;

            border-radius: 8px;

            box-shadow: 0px 0px 10px rgba(0,0,0,0.3);

            max-width: 300px;
        }

    </style>

</head>

<body>

    <div class="info-box">

        <h3>CDR Investigation Map</h3>

        <p>
            Tower movement visualization
        </p>

    </div>

    <div id="map"></div>

    <script>

        // -----------------------------------
        // INITIALIZE MAP
        // -----------------------------------
        const map = L.map('map').setView(
            [24.8607, 67.0011],
            11
        );

        // -----------------------------------
        // OPENSTREETMAP
        // -----------------------------------
        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution:
                    '&copy; OpenStreetMap contributors'
            }
        ).addTo(map);

        // -----------------------------------
        // FETCH MAP DATA
        // -----------------------------------
        fetch('/map-data')

        .then(response => response.json())

        .then(data => {
            
            console.log("MAP DATA:", data);
            console.log("TOTAL POINTS:", data.length);    
            
            let movementPoints = [];

            data.forEach((point, index) => {

                const lat = point.latitude;
                const lng = point.longitude;

                movementPoints.push([lat, lng]);

                // -----------------------------------
                // MARKER
                // -----------------------------------
                const marker = L.marker(
                    [lat, lng]
                ).addTo(map);

                // -----------------------------------
                // POPUP
                // -----------------------------------
                marker.bindPopup(`

                    <b>Tower:</b>
                    ${point.tower}

                    <br>

                    <b>Sector:</b>
                    ${point.sector}

                    <br>

                    <b>Contact:</b>
                    ${point.contact}

                    <br>

                    <b>Direction:</b>
                    ${point.direction}

                    <br>

                    <b>DateTime:</b>
                    ${point.datetime}

                `);

                // -----------------------------------
                // TOWER RADIUS
                // -----------------------------------
                L.circle(
                    [lat, lng],
                    {
                        radius: 800,

                        color: 'blue',

                        fillColor: '#30a5ff',

                        fillOpacity: 0.1
                    }
                ).addTo(map);

            });

            // -----------------------------------
            // MOVEMENT PATH
            // -----------------------------------
            const polyline = L.polyline(
                movementPoints,
                {
                    color: 'red',
                    weight: 3
                }
            ).addTo(map);

            // zoom to fit
            map.fitBounds(
                polyline.getBounds()
            );

        })

        .catch(error => {

            console.error(
                'Map Data Error:',
                error
            );
        });

    </script>

</body>

</html>
