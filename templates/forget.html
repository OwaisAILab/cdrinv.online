<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CDR Intelligence Portal — Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>

<style>

/* SAME STYLE AS LOGIN PAGE */

html { font-size: 16px; }

:root{
--bg:#04100a;
--surface:#091a10;
--surface2:#0d2218;
--border:#1e4030;
--accent:#c9a84c;
--accent2:#fff;
--muted:#1e4030;
--text:#fff;
--dim:#888;
--danger:#ff003c;
--mono:'Share Tech Mono',monospace;
--sans:'Barlow',sans-serif;
--cond:'Barlow Condensed',sans-serif
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:var(--sans);
min-height:100vh;
display:flex;
flex-direction:column;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(201,168,76,.012) 2px,
rgba(201,168,76,.012) 4px
);
pointer-events:none;
z-index:9999;
}

header{
padding:22px 40px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
}

header::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:2px;
background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);
}

.logo{
display:flex;
align-items:center;
gap:14px;
}

.logo-mark{
width:38px;
height:38px;
border:2px solid var(--accent);
display:grid;
place-items:center;
}

.logo-title{
font-family:var(--cond);
font-size:1.3rem;
font-weight:900;
letter-spacing:.12em;
text-transform:uppercase;
color:var(--accent);
}

.logo-sub{
font-family:var(--mono);
font-size:.9rem;
color:var(--muted);
}

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.login-wrap{
width:100%;
max-width:780px;
display:grid;
grid-template-columns:1fr 1fr;
border:1px solid var(--border);
}

@media(max-width:700px){
.login-wrap{
grid-template-columns:1fr;
}
}

.left-panel{
background:linear-gradient(145deg,#0a0a0a,#111);
padding:44px;
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
justify-content:center;
position:relative;
overflow:hidden;
}

.left-panel::before{
content:'OTP';
position:absolute;
bottom:-20px;
right:-10px;
font-family:var(--cond);
font-size:8rem;
font-weight:900;
color:rgba(201,168,76,.04);
}

.panel-badge{
font-family:var(--mono);
font-size:.9rem;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--accent);
margin-bottom:24px;
}

.panel-h{
font-family:var(--cond);
font-size:2rem;
font-weight:900;
line-height:1.1;
margin-bottom:16px;
text-transform:uppercase;
}

.panel-h span{
color:var(--accent);
}

.panel-text{
font-family:var(--mono);
font-size:.95rem;
color:var(--dim);
line-height:1.8;
}

.right-panel{
background:var(--surface);
padding:44px;
}

.form-title{
font-family:var(--cond);
font-size:1.4rem;
font-weight:900;
letter-spacing:.1em;
text-transform:uppercase;
color:var(--accent);
margin-bottom:6px;
}

.form-sub{
font-family:var(--mono);
font-size:.92rem;
color:var(--dim);
letter-spacing:.1em;
margin-bottom:28px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
font-family:var(--mono);
font-size:.92rem;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--dim);
margin-bottom:7px;
}

input{
width:100%;
background:#111;
border:1px solid var(--border);
color:var(--text);
font-family:var(--mono);
font-size:1rem;
padding:12px 14px;
outline:none;
transition:border-color .2s;
}

input:focus{
border-color:var(--accent);
}

.btn{
width:100%;
background:var(--accent);
color:#000;
border:none;
font-family:var(--cond);
font-size:1rem;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase;
padding:14px;
cursor:pointer;
transition:all .2s;
}

.btn:hover{
background:#d4a843;
transform:translateY(-1px);
}

.back-link{
margin-top:18px;
text-align:center;
font-family:var(--mono);
font-size:.9rem;
}

.back-link a{
color:var(--accent);
text-decoration:none;
}

footer{
text-align:center;
padding:16px;
font-family:var(--mono);
font-size:.9rem;
color:var(--muted);
border-top:1px solid var(--border);
}

</style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="4" stroke="#c9a84c" stroke-width="1.5"/>
      </svg>
    </div>

    <div>
      <div class="logo-title">CDR Intelligence</div>
      <div class="logo-sub">Password Recovery</div>
    </div>
  </div>
</header>

<main>

<div class="login-wrap">

  <!-- LEFT SIDE -->

  <div class="left-panel">

    <div class="panel-badge">Secure Verification</div>

    <div class="panel-h">
      Password<br>
      Reset<span>.</span>
    </div>

    <p class="panel-text">
      Enter your registered email address.
      A One-Time Password (OTP) will be sent
      for identity verification.
    </p>

  </div>

  <!-- RIGHT SIDE -->

  <div class="right-panel">

    <div class="form-title">Forgot Password</div>

    <div class="form-sub">
      OTP verification required
    </div>

    <form id="forgotForm">

      <div class="form-group">
        <label>Email Address</label>

        <input
          type="email"
          id="email"
          placeholder="your@email.com"
          required
        />
      </div>

      <button type="submit" class="btn">
        Next
      </button>

    </form>

    <div class="back-link">
      <a href="login.html">← Back to Login</a>
    </div>

  </div>

</div>

</main>

<footer>
CDR Intelligence Portal | Authorized Personnel Only
</footer>

<script>

document.getElementById("forgotForm").addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.getElementById("email").value;

    // DEMO MESSAGE
    alert("OTP sent to: " + email);

    // MOVE TO RESET PAGE
    window.location.href = "reset.html";

});

</script>

</body>
</html>
